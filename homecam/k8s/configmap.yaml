apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel-noc
  labels:
    app.kubernetes.io/part-of: sentinel-noc
data:
  PORT: "8001"
  ENVIRONMENT: "production"
  DB_NAME: "sentinel_noc"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW: "60"
  CORS_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:8001"
  MEDIAMTX_URL: "http://mediamtx-service:9997"

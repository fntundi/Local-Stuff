apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: sentinel-noc
  labels:
    app: mediamtx
    app.kubernetes.io/part-of: sentinel-noc
data:
  mediamtx.yml: |
    logLevel: info
    logDestinations: [stdout]
    readTimeout: 10s
    writeTimeout: 10s
    writeQueueSize: 512
    udpMaxPayloadSize: 1472

    # REST API for path management
    api: yes
    apiAddress: :9997

    metrics: no
    pprof: no

    # RTSP server
    rtspAddress: :8554
    rtspsAddress: :8322
    rtpAddress: :8000
    rtcpAddress: :8001

    # HLS server for browser playback
    hlsAddress: :8888
    hlsAlwaysRemux: yes
    hlsSegmentCount: 3
    hlsSegmentDuration: 1s
    hlsPartDuration: 200ms
    hlsSegmentMaxSize: 50M

    # Dynamic path configuration (managed via API by Sentinel NOC backend)
    paths:
      all_others:
        source: publisher

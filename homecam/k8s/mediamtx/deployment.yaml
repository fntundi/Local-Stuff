apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  namespace: sentinel-noc
  labels:
    app: mediamtx
    app.kubernetes.io/part-of: sentinel-noc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: mediamtx
          image: bluenviron/mediamtx:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - containerPort: 8554
              name: rtsp
              protocol: TCP
            - containerPort: 8000
              name: rtp
              protocol: UDP
            - containerPort: 8001
              name: rtcp
              protocol: UDP
            - containerPort: 8888
              name: hls
              protocol: TCP
            - containerPort: 9997
              name: api
              protocol: TCP
          volumeMounts:
            - name: mediamtx-config
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v3/paths/list
              port: 9997
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v3/paths/list
              port: 9997
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
      volumes:
        - name: mediamtx-config
          configMap:
            name: mediamtx-config

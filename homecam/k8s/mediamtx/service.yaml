apiVersion: v1
kind: Service
metadata:
  name: mediamtx-service
  namespace: sentinel-noc
  labels:
    app: mediamtx
    app.kubernetes.io/part-of: sentinel-noc
spec:
  type: NodePort
  selector:
    app: mediamtx
  ports:
    - name: rtsp
      port: 8554
      targetPort: 8554
      protocol: TCP
    - name: hls
      port: 8888
      targetPort: 8888
      protocol: TCP
      nodePort: 30888
    - name: api
      port: 9997
      targetPort: 9997
      protocol: TCP

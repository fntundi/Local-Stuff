apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sentinel-noc
  labels:
    app: backend
    app.kubernetes.io/part-of: sentinel-noc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until nc -z mongodb-service 27017; do
                echo "waiting for mongodb..."; sleep 2
              done
      containers:
        - name: backend
          image: sentinel-backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: PORT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: ENVIRONMENT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: DB_NAME
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: RATE_LIMIT_MAX
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: RATE_LIMIT_MAX
            - name: RATE_LIMIT_WINDOW
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: RATE_LIMIT_WINDOW
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: CORS_ORIGINS
            - name: MEDIAMTX_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: MEDIAMTX_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: encryption-key
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: mongo-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: mongo-password
            - name: MONGO_URL
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-service:27017"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

# Sentinel NOC - Development Docker Compose Configuration
# ========================================================
# This file extends docker-compose.yml for development.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up


services:
  # ===========================================================================
  # Backend - Development Configuration
  # ===========================================================================
  backend:
    environment:
      # More verbose logging in development
      LOG_LEVEL: DEBUG
    # Mount source for hot reload
    volumes:
      - ./backend:/app

  # ===========================================================================
  # MediaMTX - Development Configuration
  # ===========================================================================
  mediamtx:
    environment:
      MTX_LOGLEVEL: debug

  # ===========================================================================
  # Frontend - Development Configuration
  # ===========================================================================
  frontend:
    environment:
      # Enable detailed error messages
      FAST_REFRESH: "true"
    # Mount source for hot reload
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules

  # ===========================================================================
  # MongoDB Express - Database Admin UI (Development Only)
  # ===========================================================================
  mongo-express:
    image: mongo-express:latest
    container_name: sentinel-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - sentinel-network

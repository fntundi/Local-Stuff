# Jenkins Configuration as Code
# Apply via: Manage Jenkins → Configuration as Code → Apply new configuration
# Reference: https://github.com/jenkinsci/configuration-as-code-plugin

jenkins:
  systemMessage: "Home Platform CI/CD — HomeCam | local-aistack | Sentinel-Home"
  numExecutors: 0          # Controller runs no jobs — all work goes to agents
  mode: EXCLUSIVE

  # ──────────────────────────────────────────────────────────────────────────
  # Global Pipeline Libraries
  # ──────────────────────────────────────────────────────────────────────────
  globalNodeProperties:
    - envVars:
        env:
          - key: DOCKER_REGISTRY
            value: "localhost:5000"
          - key: SONARQUBE_URL
            value: "http://sonarqube:9000"
          - key: SONARQUBE_PROJECT_KEY_PREFIX
            value: "home-platform"
          - key: ZAP_IMAGE
            value: "ghcr.io/zaproxy/zaproxy:stable"
          - key: TRAEFIK_NETWORK
            value: "home-net"

  # ──────────────────────────────────────────────────────────────────────────
  # Views — single pane of glass
  # ──────────────────────────────────────────────────────────────────────────
  views:
    - dashboard:
        name: "Overview"
        description: "All apps — last build status at a glance"
        includeRegex: ".*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"
        portlets:
          - buildStatisticsPortlet:
              name: "Build Statistics"
          - unstableJobsPortlet:
              name: "Unstable / Failing Jobs"

    - listView:
        name: "HomeCam"
        description: "All HomeCam pipelines"
        includeRegex: "HomeCam/.*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"

    - listView:
        name: "local-aistack"
        description: "All local-aistack pipelines"
        includeRegex: "local-aistack/.*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"

    - listView:
        name: "Sentinel-Home"
        description: "All Sentinel-Home pipelines"
        includeRegex: "Sentinel-Home/.*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"

    - listView:
        name: "Security Scans"
        description: "ZAP and SonarQube jobs across all apps"
        includeRegex: ".*(sonar|zap|security).*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"

    - listView:
        name: "Deployments"
        description: "All deployment pipelines"
        includeRegex: ".*/Deploy/.*"
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"

# ──────────────────────────────────────────────────────────────────────────
# Credentials (stubs — replace secret values via Jenkins UI or Vault)
# ──────────────────────────────────────────────────────────────────────────
credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "sonarqube-token"
              description: "SonarQube analysis token"
              secret: "${SONARQUBE_TOKEN}"
          - usernamePassword:
              id: "docker-registry-creds"
              description: "Docker registry login"
              username: "${DOCKER_USER}"
              password: "${DOCKER_PASSWORD}"
          - file:
              id: "kubeconfig-homecam"
              description: "kubeconfig for HomeCam k3d cluster"
              fileName: "kubeconfig-homecam"
              secretBytes: "${KUBECONFIG_HOMECAM}"
          - file:
              id: "kubeconfig-aistack"
              description: "kubeconfig for local-aistack k8s"
              fileName: "kubeconfig-aistack"
              secretBytes: "${KUBECONFIG_AISTACK}"
          - file:
              id: "kubeconfig-sentinel"
              description: "kubeconfig for Sentinel-Home cluster"
              fileName: "kubeconfig-sentinel"
              secretBytes: "${KUBECONFIG_SENTINEL}"
          - usernamePassword:
              id: "git-credentials"
              description: "Git SCM credentials"
              username: "${GIT_USER}"
              password: "${GIT_TOKEN}"

# ──────────────────────────────────────────────────────────────────────────
# SonarQube server
# ──────────────────────────────────────────────────────────────────────────
unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"
        mojoVersion: ""
        additionalAnalysisProperties: ""
        additionalProperties: ""
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

  # Global pipeline library pointing to this repo
  globalLibraries:
    libraries:
      - name: "home-platform"
        defaultVersion: "main"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          modernSCM:
            scm:
              git:
                remote: "${GIT_REPO_URL}"
                credentialsId: "git-credentials"
                traits:
                  - gitBranchDiscovery

  # Build timeout — prevent runaway builds
  buildDiscarderStrategy:
    logRotator:
      daysToKeepStr: "30"
      numToKeepStr: "50"
      artifactDaysToKeepStr: "14"
      artifactNumToKeepStr: "20"


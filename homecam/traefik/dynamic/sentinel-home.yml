# =============================================================================
# Traefik Dynamic Configuration — Sentinel-Home  (Skeleton)
#
# Fill in service URLs and ports once the Sentinel-Home stack is defined.
# Container names below are placeholders — update to match your compose service names.
# =============================================================================

http:
  # ──────────────────────────────────────────────────────────────────────────
  # Routers
  # ──────────────────────────────────────────────────────────────────────────
  routers:

    sentinel-home-frontend:
      rule: "Host(`sentinel.home`)"
      entryPoints:
        - websecure
      tls: {}
      service: sentinel-home-frontend-svc
      middlewares:
        - sentinel-home-security-headers

    sentinel-home-api:
      rule: "Host(`sentinel.home`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      tls: {}
      service: sentinel-home-backend-svc
      middlewares:
        - sentinel-home-security-headers
      priority: 10

  # ──────────────────────────────────────────────────────────────────────────
  # Services — TODO: update URLs/ports when stack is defined
  # ──────────────────────────────────────────────────────────────────────────
  services:

    sentinel-home-frontend-svc:
      loadBalancer:
        servers:
          # TODO: replace with actual container name and port
          - url: "http://sentinel-home-frontend:3000"

    sentinel-home-backend-svc:
      loadBalancer:
        servers:
          # TODO: replace with actual container name and port
          - url: "http://sentinel-home-backend:8000"

  # ──────────────────────────────────────────────────────────────────────────
  # Middlewares
  # ──────────────────────────────────────────────────────────────────────────
  middlewares:

    sentinel-home-security-headers:
      headers:
        stsSeconds: 31536000
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-App: "Sentinel-Home"
          X-Powered-By: ""

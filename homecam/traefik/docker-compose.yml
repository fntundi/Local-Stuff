# =============================================================================
# Traefik Gateway Stack
#
# Run this stack FIRST, before any app stack.
# It creates the shared `home-net` network that all app containers attach to.
#
# Usage:
#   docker compose --project-name traefik-gw --file traefik/docker-compose.yml up -d
#
# Then in each app's docker-compose.yml, add:
#   networks:
#     home-net:
#       external: true
# and label each exposed service with traefik.enable=true (see dynamic/ configs).
# =============================================================================

# ---------------------------------------------------------------------------
# Shared gateway network — created here, referenced externally by all apps
# ---------------------------------------------------------------------------
networks:
  home-net:
    name: home-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  letsencrypt:

services:

  # ──────────────────────────────────────────────────────────────────────────
  traefik:
  # ──────────────────────────────────────────────────────────────────────────
    image: traefik:v3.1
    container_name: traefik-gateway
    restart: unless-stopped
    networks:
      - home-net
    ports:
      - "80:80"
      - "443:443"
      - "8554:8554"    # RTSP passthrough (HomeCam / MediaMTX)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - letsencrypt:/letsencrypt
    environment:
      - TZ=${TZ:-America/New_York}
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.home`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      # Basic auth for dashboard — generate with: htpasswd -nb admin password
      # Replace below with your own htpasswd hash
      traefik.http.routers.traefik-dashboard.middlewares: "dashboard-auth"
      traefik.http.middlewares.dashboard-auth.basicauth.users: "${TRAEFIK_DASHBOARD_USERS:-admin:$$apr1$$xyz$$placeholder}"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Optional: Whoami for testing Traefik routing
  # Remove in production
  # ──────────────────────────────────────────────────────────────────────────
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - home-net
    labels:
      traefik.enable: "true"
      traefik.http.routers.whoami.rule: "Host(`whoami.home`)"
      traefik.http.routers.whoami.entrypoints: "websecure"
      traefik.http.routers.whoami.tls: "true"

# =============================================================================
# Traefik Static Configuration
# Gateway for: HomeCam | local-aistack | Sentinel-Home
# =============================================================================

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
          permanent: false   # set true once certs are in place

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt   # or 'localcerts' for self-signed

  # Raw TCP/UDP (for RTSP streaming from HomeCam / MediaMTX)
  rtsp:
    address: ":8554/tcp"

  # Traefik internal metrics / healthz
  metrics:
    address: ":8082"

# ---------------------------------------------------------------------------
# API & Dashboard
# ---------------------------------------------------------------------------
api:
  dashboard: true
  insecure: false   # dashboard served over websecure only

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  # Docker provider — picks up container labels automatically
  docker:
    endpoint: "unix:///var/run/docker.sock"
    network: home-net          # shared network all app containers attach to
    exposedByDefault: false    # only expose containers with traefik.enable=true
    watch: true

  # File provider — static routing rules for k8s NodePort services
  # and any service not running in Docker (e.g., HomeCam via k3d port-map)
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# ---------------------------------------------------------------------------
# Certificate resolvers
# ---------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@home.local"
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: web

  localcerts:
    acme:
      email: "admin@home.local"
      storage: "/letsencrypt/acme-local.json"
      tlsChallenge: {}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: drop
      names:
        Authorization: redact

# ---------------------------------------------------------------------------
# Metrics (Prometheus)
# ---------------------------------------------------------------------------
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true

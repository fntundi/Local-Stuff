---
sentinel_deploy_strategy: k8s
sentinel_compose_dir: "{{ platform_repo_root }}/Sentinel-Home"
sentinel_project_name: sentinel-home
sentinel_k8s_dir: "{{ sentinel_compose_dir }}/k8s"
sentinel_k3d_cluster: "{{ k3d_sentinel_home_cluster | default('sentinel-home') }}"
sentinel_k3d_config: "{{ platform_repo_root }}/sentinel-home/k8s/k3d-config.yaml"
sentinel_namespace: "{{ k8s_sentinel_home_namespace | default('sentinel-home') }}"
sentinel_hostname: sentinel.blackiechan.net
sentinel_base_url: "https://sentinel.blackiechan.net"
sentinel_authentik_client_id: sentinel-home
sentinel_authentik_redirect_url: "https://sentinel.blackiechan.net/oauth2/callback"

# NodePort values — must match sentinel-home/k8s/k3d-config.yaml
sentinel_k3d_lb_http_port:  "{{ k3d_sentinel_home_lb_http_port  | default(31000) }}"
sentinel_k3d_lb_https_port: "{{ k3d_sentinel_home_lb_https_port | default(31443) }}"
sentinel_k3d_backend_port:  "{{ k3d_sentinel_home_backend_port  | default(31001) }}"

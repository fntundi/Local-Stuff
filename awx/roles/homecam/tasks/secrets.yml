---
- name: Generate JWT secret if not provided
  ansible.builtin.set_fact:
    homecam_jwt_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: homecam_jwt_secret is not defined or homecam_jwt_secret | length == 0
  no_log: true

- name: Generate encryption key if not provided
  ansible.builtin.set_fact:
    homecam_encryption_key: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: homecam_encryption_key is not defined or homecam_encryption_key | length == 0
  no_log: true

- name: Generate MongoDB password if not provided
  ansible.builtin.set_fact:
    homecam_mongo_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
  when: homecam_mongo_password is not defined or homecam_mongo_password | length == 0
  no_log: true

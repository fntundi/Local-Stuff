---
 - name: Ensure Authentik compose directory exists
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}"
    state: directory
    owner: "{{ platform_user }}"
    group: "{{ platform_group | default(platform_user) }}"
    mode: "0755"
  tags: [authentik, config]

- name: Write Authentik .env
  ansible.builtin.template:
    src: authentik.env.j2
    dest: "{{ authentik_compose_dir }}/.env"
    owner: "{{ platform_user }}"
    group: "{{ platform_group | default(platform_user) }}"
    mode: "0600"
  tags: [authentik, config]

- name: Ensure Authentik blueprint directory exists
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}/blueprints"
    state: directory
    owner: "{{ platform_user }}"
    group: "{{ platform_group | default(platform_user) }}"
    mode: "0755"
  tags: [authentik, config]

- name: Write Authentik compose file
  ansible.builtin.copy:
    src: "{{ platform_repo_root }}/authentik/docker-compose.yml"
    dest: "{{ authentik_compose_dir }}/docker-compose.yml"
    remote_src: true
    owner: "{{ platform_user }}"
    group: "{{ platform_group | default(platform_user) }}"
    mode: "0644"
  tags: [authentik, config]

- name: Create Authentik network
  community.docker.docker_network:
    name: "{{ traefik_network }}"
    driver: bridge
    ipam_config:
      - subnet: "{{ traefik_subnet }}"
    state: present
  tags: [authentik, network]

- name: Start Authentik stack
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_compose_dir }}"
    project_name: "{{ authentik_project_name }}"
    files:
      - docker-compose.yml
    state: present
    pull: missing
  become_user: "{{ platform_user }}"
  register: authentik_result
  tags: [authentik, deploy]

- name: Wait for Authentik to become ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ authentik_server_port }}/-/health/ready/"
    status_code: 200
    timeout: 10
  register: authentik_ready
  retries: 30
  delay: 10
  until: authentik_ready.status == 200
  tags: [authentik, verify]

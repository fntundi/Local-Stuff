    # ── Schedules ─────────────────────────────────────────────────────────────
    - name: Schedule health checks (every 15 min)
      awx.awx.schedule:
        controller_host:     "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: false
        name: "Health Check — every 15m"
        unified_job_template: "Ops | Health Check"
        rrule: "DTSTART:20240101T000000Z RRULE:FREQ=MINUTELY;INTERVAL=15"
        enabled: true
        state: present
      tags: [schedules]

    - name: Schedule daily backup (02:00)
      awx.awx.schedule:
        controller_host:     "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: false
        name: "Backup — daily 02:00"
        unified_job_template: "Ops | Backup All"
        rrule: "DTSTART:20240101T020000Z RRULE:FREQ=DAILY"
        enabled: true
        state: present
      tags: [schedules]

    - name: Schedule weekly maintenance (Sun 03:00)
      awx.awx.schedule:
        controller_host:     "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: false
        name: "Maintenance — weekly Sunday 03:00"
        unified_job_template: "Ops | Maintenance"
        rrule: "DTSTART:20240107T030000Z RRULE:FREQ=WEEKLY;BYDAY=SU"
        enabled: true
        state: present
      tags: [schedules]


---
- name: Provision Home Server
  hosts: home_servers
  become: true
  gather_facts: true

  roles:
    - role: ../../roles/common
      tags: [common, provision]

  post_tasks:
    - name: Print provision summary
      ansible.builtin.debug:
        msg: >-
          Server {{ inventory_hostname }} provisioned.
          User {{ platform_user }} ready.
          SSH on port {{ ssh_port }}.
          UFW active with rules for ports 22, 80, 443, 8554.
      tags: [always]

---
- name: Install k3d, kubectl, and Helm
  hosts: home_servers
  become: true
  gather_facts: true

  roles:
    - role: ../../roles/k3d_tools
      tags: [k3d]

  post_tasks:
    - name: Verify kubectl
      ansible.builtin.command: kubectl version --client --output=json
      become_user: "{{ platform_user }}"
      register: kubectl_ver
      changed_when: false
      ignore_errors: true
      tags: [verify]

    - name: Verify k3d
      ansible.builtin.command: k3d version
      become_user: "{{ platform_user }}"
      register: k3d_ver
      changed_when: false
      ignore_errors: true
      tags: [verify]

    - name: Verify Helm
      ansible.builtin.command: helm version --short
      become_user: "{{ platform_user }}"
      register: helm_ver
      changed_when: false
      ignore_errors: true
      tags: [verify]

    - name: Tool versions
      ansible.builtin.debug:
        msg:
          kubectl: "{{ kubectl_ver.stdout | default('not found') }}"
          k3d:     "{{ k3d_ver.stdout | default('not found') }}"
          helm:    "{{ helm_ver.stdout | default('not found') }}"
      tags: [verify]

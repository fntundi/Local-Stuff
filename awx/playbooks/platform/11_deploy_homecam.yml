---
- name: Deploy HomeCam (Sentinel NOC)
  hosts: home_servers
  become: false
  gather_facts: true

  pre_tasks:
    - name: Ensure data directories exist
      ansible.builtin.include_role:
        name: ../../roles/platform_dirs
        tasks_from: homecam
      tags: [dirs]

  roles:
    - role: ../../roles/homecam
      tags: [homecam]

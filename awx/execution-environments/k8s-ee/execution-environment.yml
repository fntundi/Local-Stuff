---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "--pre"

images:
  base_image:
    name: ghcr.io/ansible/awx-ee:24.6.0

dependencies:
  ansible_core:
    package_pip: ansible-core>=2.15,<2.17
  ansible_runner:
    package_pip: ansible-runner
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  prepend_galaxy:
    - ADD _build/configs/ansible.cfg /home/runner/.ansible.cfg
  append_final:
    # kubectl
    - RUN curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
        && chmod +x kubectl && mv kubectl /usr/local/bin/
    # k3d
    - RUN curl -fsSL https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64 \
        -o /usr/local/bin/k3d && chmod +x /usr/local/bin/k3d
    # helm
    - RUN curl -fsSL https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz \
        | tar xz --strip-components=1 -C /usr/local/bin linux-amd64/helm
    - RUN echo "k8s-ee ready"

# =============================================================================
# AWX — Ansible Automation Platform (Community Edition)
# Version: 24.6.0
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d
#   docker compose exec awx-task awx-manage createsuperuser
#
# Access: http://localhost:8052  (override AWX_HOST_PORT in .env)
# =============================================================================

networks:
  awx-net:
    driver: bridge
  home-net:
    external: true

volumes:
  awx-postgres-data:
  awx-redis-data:
  awx-projects:
  awx-receptor-data:

services:

  awx-postgres:
    image: postgres:14-alpine
    container_name: awx-postgres
    restart: unless-stopped
    networks: [awx-net]
    volumes:
      - awx-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       "${AWX_PG_DATABASE:-awx}"
      POSTGRES_USER:     "${AWX_PG_USERNAME:-awx}"
      POSTGRES_PASSWORD: "${AWX_PG_PASSWORD:?AWX_PG_PASSWORD is required}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AWX_PG_USERNAME:-awx}"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-redis:
    image: redis:7-alpine
    container_name: awx-redis
    restart: unless-stopped
    networks: [awx-net]
    volumes:
      - awx-redis-data:/data
    command: >
      redis-server
      --requirepass "${AWX_REDIS_PASSWORD:?AWX_REDIS_PASSWORD is required}"
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AWX_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-web:
    image: quay.io/ansible/awx:${AWX_VERSION:-24.6.0}
    container_name: awx-web
    restart: unless-stopped
    networks: [awx-net, home-net]
    ports:
      - "${AWX_HOST_PORT:-8052}:8052"
    volumes:
      - awx-projects:/var/lib/awx/projects
      - awx-receptor-data:/var/run/receptor
      - ./settings/local_settings.py:/etc/tower/conf.d/local_settings.py:ro
    environment: &awx-env
      AWX_ADMIN_USER:     "${AWX_ADMIN_USER:-admin}"
      AWX_ADMIN_PASSWORD: "${AWX_ADMIN_PASSWORD:?AWX_ADMIN_PASSWORD is required}"
      DATABASE_HOST:      awx-postgres
      DATABASE_PORT:      "5432"
      DATABASE_NAME:      "${AWX_PG_DATABASE:-awx}"
      DATABASE_USER:      "${AWX_PG_USERNAME:-awx}"
      DATABASE_PASSWORD:  "${AWX_PG_PASSWORD}"
      REDIS_HOST:         awx-redis
      REDIS_PORT:         "6379"
      REDIS_PASSWORD:     "${AWX_REDIS_PASSWORD}"
      AWX_SECRET_KEY:     "${AWX_SECRET_KEY:?AWX_SECRET_KEY is required}"
      BROADCAST_WEBSOCKET_SECRET: "${AWX_SECRET_KEY}"
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8052/api/v2/ping/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  awx-task:
    image: quay.io/ansible/awx:${AWX_VERSION:-24.6.0}
    container_name: awx-task
    restart: unless-stopped
    networks: [awx-net]
    command: /usr/bin/launch_awx_task.sh
    volumes:
      - awx-projects:/var/lib/awx/projects
      - awx-receptor-data:/var/run/receptor
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./settings/local_settings.py:/etc/tower/conf.d/local_settings.py:ro
    environment:
      <<: *awx-env
    depends_on:
      awx-web:
        condition: service_healthy
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, AUDIT_WRITE]

  awx-receptor:
    image: quay.io/ansible/receptor:latest
    container_name: awx-receptor
    restart: unless-stopped
    networks: [awx-net]
    volumes:
      - awx-receptor-data:/var/run/receptor
      - ./receptor/receptor.conf:/etc/receptor/receptor.conf:ro
    depends_on:
      - awx-task

---
# Home Platform — AWX-compatible inventory
# Adjust ansible_host to your server's IP or hostname.
# For AWX, import this file or configure a Static Inventory with these groups.

all:
  vars:
    ansible_user: "{{ platform_user }}"
    ansible_python_interpreter: /usr/bin/python3

  children:
    home_servers:
      hosts:
        home-server:
          ansible_host: 192.168.1.100     # ← change to your server IP
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    sonarqube_servers:
      hosts:
        sonarqube-server:
          ansible_host: 192.168.1.110     # ← change to your SonarQube VM IP
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    jenkins_servers:
      hosts:
        jenkins-server:
          ansible_host: 192.168.1.111     # ← change to your Jenkins VM IP
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    jenkins_runners:
      hosts:
        jenkins-runner:
          ansible_host: 192.168.1.112     # ← change to your Jenkins runner VM IP
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # Logical groups for AWX inventory groups
    infra:
      hosts:
        home-server:

    platform:
      hosts:
        home-server:

    ops:
      hosts:
        home-server:

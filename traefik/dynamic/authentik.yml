# Traefik Dynamic Config — Authentik SSO
# Shared forward-auth middleware for all app routers.

http:
  routers:
    authentik:
      rule: "Host(`authentik.blackiechan.net`)"
      entryPoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: authentik-svc
      priority: 100

    authentik-outpost:
      rule: "Host(`authentik.blackiechan.net`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: authentik-svc
      priority: 110

  services:
    authentik-svc:
      loadBalancer:
        servers:
          - url: "http://authentik:9000"
        passHostHeader: true

  middlewares:
    authentik:
      forwardAuth:
        address: "http://authentik:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

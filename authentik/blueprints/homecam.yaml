version: 1
metadata:
  name: homecam
  labels:
    blueprints.goauthentik.io/description: "HomeCam — Proxy Provider + Application"
    blueprints.goauthentik.io/instantiate: "true"

entries:

  # ── Access group ──────────────────────────────────────────────────────────
  - id: homecam-group
    model: authentik_core.group
    state: present
    identifiers:
      name: homecam-users
    attrs:
      name: homecam-users

  # ── Proxy Provider (forward-auth, single-app mode) ────────────────────────
  - id: homecam-provider
    model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: HomeCam
    attrs:
      name: HomeCam
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      mode: forward_single
      external_host: https://homecam.blackiechan.net
      access_token_validity: hours=24
      refresh_token_validity: days=7
      # Trust X-Forwarded-For from Traefik on the same home-net
      internal_host_ssl_validation: false

  # ── Application ───────────────────────────────────────────────────────────
  - id: homecam-app
    model: authentik_core.application
    state: present
    identifiers:
      slug: homecam
    attrs:
      name: HomeCam
      slug: homecam
      provider: !KeyOf homecam-provider
      meta_description: "Home camera monitoring"
      meta_publisher: "Home Platform"
      open_in_new_tab: false
      policy_engine_mode: any

  # ── Policy binding — restrict access to homecam-users group ──────────────
  - model: authentik_policies_event_matcher.eventmatcherpolicy
    state: absent
    identifiers:
      name: homecam-group-binding    # remove stale bindings on re-apply

  - id: homecam-group-binding
    model: authentik_core.policybinding
    state: present
    identifiers:
      order: 10
      target: !KeyOf homecam-app
      group: !KeyOf homecam-group
    attrs:
      order: 10
      target: !KeyOf homecam-app
      group: !KeyOf homecam-group
      enabled: true
      negate: false
      timeout: 30
